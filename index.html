<html lang="es">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <style>

            from { opacity: 0; transform: translateX(20px); }

</head>
<body class="bg-pattern text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONSTANTES GLOBALES ---
        const QUIZ_TITLE = "Dominando 'Poder' - Español II";
        
        // --- CONFIGURACIÓN DE FIREBASE ---
        // Si despliegas en GitHub, pega tus credenciales aquí:
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        // --- INICIALIZACIÓN DE DATOS ---
        const TENSES = {
            PRESENT: "Presente de Indicativo",
            PRETERITE: "Pretérito de Indicativo",
            FUTURE: "Futuro Informal",
            PERFECT: "Pretérito Perfecto"
        };

        const LEARNING_SLIDES = {
            [TENSES.PRESENT]: {
                title: "Poder in the Indicative Present",
                desc: "The Indicative Present is used for current abilities or general facts. To make it negative, place 'no' before the verb. For questions, you can often omit the subject or change its position.",
                examples: [
                    { s: "Puedo hablar español.", t: "Translation: I can speak Spanish." },
                    { s: "No podemos ir.", t: "Translation: We cannot go." },
                    { s: "¿Puedes ayudar?", t: "Translation: Can you help?" }
                ]
            },
            [TENSES.PRETERITE]: {
                title: "Poder in the Indicative Preterite",
                desc: "The Preterite refers to past completed actions. 'Pude' often means 'I managed to' or 'I succeeded in'. Negatives like 'no pude' usually mean 'I failed to'.",
                examples: [
                    { s: "Pude terminar la tarea.", t: "Translation: I managed to finish the homework." },

                ]
            },
            [TENSES.FUTURE]: {
                title: "Poder in the Informal Future (Ir + a + Poder)",
                desc: "This construction says what someone 'is going to be able to' do. Negatives place 'no' before the conjugated form of 'ir'.",
                examples: [
                    { s: "Voy a poder ir.", t: "Translation: I am going to be able to go." },
                    { s: "No van a poder jugar.", t: "Translation: They are not going to be able to play." },
                    { s: "¿Vas a poder ayudar?", t: "Translation: Are you going to be able to help?" }
                ]
            },
            [TENSES.PERFECT]: {
                title: "Poder in the Present Perfect",
                desc: "Uses 'Haber + Podido' to connect the past with the present. 'Podido' stays the same for everyone. Negatives put 'no' before the conjugated 'haber'.",
                examples: [
                    { s: "He podido dormir.", t: "Translation: I have been able to sleep." },
                    { s: "No hemos podido viajar.", t: "Translation: We have not been able to travel." },
                    { s: "¿Ha podido él leer?", t: "Translation: Has he been able to read?" }
                ]
            }
        };

        const QUESTIONS_RAW = [
            // Presente (12)
            { q: "I can study.", a: ["Yo", "puedo", "estudiar"], alt: ["Puedo", "estudiar"], tense: TENSES.PRESENT, dist: ["podemos", "puedes", "estudiando"] },
            { q: "You (inf) cannot run.", a: ["Tú", "no", "puedes", "correr"], alt: ["No", "puedes", "correr"], tense: TENSES.PRESENT, dist: ["puedo", "puede", "pudiendo"] },
            { q: "Can he help?", a: ["¿", "Él", "puede", "ayudar", "?"], alt: ["¿", "Puede", "él", "ayudar", "?"], alt2: ["¿", "Puede", "ayudar", "él", "?"], alt3: ["¿", "Puede", "ayudar", "?"], tense: TENSES.PRESENT, dist: ["pueden", "pude", "ayudado"] },
            { q: "We can sing.", a: ["Nosotros", "podemos", "cantar"], alt: ["Podemos", "cantar"], tense: TENSES.PRESENT, dist: ["pueden", "puedo", "cantando"] },
            { q: "They cannot speak.", a: ["Ellos", "no", "pueden", "hablar"], alt: ["No", "pueden", "hablar"], tense: TENSES.PRESENT, dist: ["puede", "podemos", "hablado"] },
            { q: "Can she dance?", a: ["¿", "Ella", "puede", "bailar", "?"], alt: ["¿", "Puede", "ella", "bailar", "?"], alt2: ["¿", "Puede", "bailar", "ella", "?"], alt3: ["¿", "Puede", "bailar", "?"], tense: TENSES.PRESENT, dist: ["puedes", "pudo", "bailando"] },
            { q: "You (formal) can wait.", a: ["Usted", "puede", "esperar"], alt: ["Puede", "esperar"], tense: TENSES.PRESENT, dist: ["puedes", "pueden", "esperando"] },
            { q: "Can you all play?", a: ["¿", "Ustedes", "pueden", "jugar", "?"], alt: ["¿", "Pueden", "ustedes", "jugar", "?"], alt2: ["¿", "Pueden", "jugar", "ustedes", "?"], alt3: ["¿", "Pueden", "jugar", "?"], tense: TENSES.PRESENT, dist: ["puedo", "puede", "jugando"] },
            { q: "We cannot cook.", a: ["Nosotros", "no", "podemos", "cocinar"], alt: ["No", "podemos", "cocinar"], tense: TENSES.PRESENT, dist: ["pueden", "puedes", "cocinado"] },
            { q: "I can work.", a: ["Yo", "puedo", "trabajar"], alt: ["Puedo", "trabajar"], tense: TENSES.PRESENT, dist: ["pude", "pudieron", "trabajado"] },
            { q: "Can they swim?", a: ["¿", "Ellos", "pueden", "nadar", "?"], alt: ["¿", "Pueden", "ellos", "nadar", "?"], alt2: ["¿", "Pueden", "nadar", "ellos", "?"], alt3: ["¿", "Pueden", "nadar", "?"], tense: TENSES.PRESENT, dist: ["pudo", "pude", "nadando"] },
            { q: "He cannot read.", a: ["Él", "no", "puede", "leer"], alt: ["No", "puede", "leer"], tense: TENSES.PRESENT, dist: ["pueden", "pudo", "leyendo"] },

            // Pretérito (13)
            { q: "I managed to go.", a: ["Yo", "pude", "ir"], alt: ["Pude", "ir"], tense: TENSES.PRETERITE, dist: ["puedo", "podía", "yendo"] },
            { q: "You (inf) did not manage to read.", a: ["Tú", "no", "pudiste", "leer"], alt: ["No", "pudiste", "leer"], tense: TENSES.PRETERITE, dist: ["puedes", "pudo", "leyendo"] },
            { q: "Did she manage to finish?", a: ["¿", "Ella", "pudo", "terminar", "?"], alt: ["¿", "Pudo", "ella", "terminar", "?"], alt2: ["¿", "Pudo", "terminar", "ella", "?"], alt3: ["¿", "Pudo", "terminar", "?"], tense: TENSES.PRETERITE, dist: ["pude", "pudieron", "terminando"] },
            { q: "We managed to win.", a: ["Nosotros", "pudimos", "ganar"], alt: ["Pudimos", "ganar"], tense: TENSES.PRETERITE, dist: ["pueden", "podemos", "ganado"] },
            { q: "They did not manage to see.", a: ["Ellos", "no", "pudieron", "ver"], alt: ["No", "pudieron", "ver"], tense: TENSES.PRETERITE, dist: ["pudo", "pude", "visto"] },
            { q: "Did you (formal) manage to arrive?", a: ["¿", "Usted", "pudo", "llegar", "?"], alt: ["¿", "Pudo", "usted", "llegar", "?"], alt2: ["¿", "Pudo", "llegar", "usted", "?"], alt3: ["¿", "Pudo", "llegar", "?"], tense: TENSES.PRETERITE, dist: ["puedes", "pudiste", "llegando"] },
            { q: "He managed to understand.", a: ["Él", "pudo", "entender"], alt: ["Pudo", "entender"], tense: TENSES.PRETERITE, dist: ["pude", "pudo", "entendido"] },
            { q: "I did not manage to eat.", a: ["Yo", "no", "pude", "comer"], alt: ["No", "pude", "comer"], tense: TENSES.PRETERITE, dist: ["puedo", "podemos", "comido"] },
            { q: "Did we manage to swim?", a: ["¿", "Nosotros", "pudimos", "nadar", "?"], alt: ["¿", "Pudimos", "nosotros", "nadar", "?"], alt2: ["¿", "Pudimos", "nadar", "nosotros", "?"], alt3: ["¿", "Pudimos", "nadar", "?"], tense: TENSES.PRETERITE, dist: ["pudo", "pueden", "nadando"] },
            { q: "They managed to hear.", a: ["Ellos", "pudieron", "oír"], alt: ["Pudieron", "oír"], tense: TENSES.PRETERITE, dist: ["pudo", "pudimos", "oyendo"] },
            { q: "Did you (inf) manage to dance?", a: ["¿", "Tú", "pudiste", "bailar", "?"], alt: ["¿", "Pudiste", "tú", "bailar", "?"], alt2: ["¿", "Pudiste", "bailar", "tú", "?"], alt3: ["¿", "Pudiste", "bailar", "?"], tense: TENSES.PRETERITE, dist: ["puedes", "pudo", "bailando"] },
            { q: "She did not manage to wait.", a: ["Ella", "no", "pudo", "esperar"], alt: ["No", "pudo", "esperar"], tense: TENSES.PRETERITE, dist: ["pude", "pudiste", "esperado"] },
            { q: "We managed to talk.", a: ["Nosotros", "pudimos", "hablar"], alt: ["Pudimos", "hablar"], tense: TENSES.PRETERITE, dist: ["puden", "pudo", "hablando"] },

            // Futuro (12)
            { q: "I am going to be able to go.", a: ["Yo", "voy", "a", "poder", "ir"], alt: ["Voy", "a", "poder", "ir"], tense: TENSES.FUTURE, dist: ["puedo", "vas", "ido"] },
            { q: "You (inf) are not going to be able to talk.", a: ["Tú", "no", "vas", "a", "poder", "hablar"], alt: ["No", "vas", "a", "poder", "hablar"], tense: TENSES.FUTURE, dist: ["va", "voy", "hablado"] },
            { q: "Is he going to be able to run?", a: ["¿", "Él", "va", "a", "poder", "correr", "?"], alt: ["¿", "Va", "él", "a", "poder", "correr", "?"], alt2: ["¿", "Va", "a", "poder", "correr", "él", "?"], alt3: ["¿", "Va", "a", "poder", "correr", "?"], tense: TENSES.FUTURE, dist: ["vamos", "pude", "corriendo"] },
            { q: "We are going to be able to study.", a: ["Nosotros", "vamos", "a", "poder", "estudiar"], alt: ["Vamos", "a", "poder", "estudiar"], tense: TENSES.FUTURE, dist: ["van", "puedo", "estudiando"] },
            { q: "They are not going to be able to finish.", a: ["Ellos", "no", "van", "a", "poder", "terminar"], alt: ["No", "van", "a", "poder", "terminar"], tense: TENSES.FUTURE, dist: ["vas", "pudieron", "terminado"] },
            { q: "Is she going to be able to start?", a: ["¿", "Ella", "va", "a", "poder", "empezar", "?"], alt: ["¿", "Va", "ella", "a", "poder", "empezar", "?"], alt2: ["¿", "Va", "a", "poder", "empezar", "ella", "?"], alt3: ["¿", "Va", "a", "poder", "empezar", "?"], tense: TENSES.FUTURE, dist: ["voy", "puedes", "empezado"] },
            { q: "You (formal) are going to be able to win.", a: ["Usted", "va", "a", "poder", "ganar"], alt: ["Va", "a", "poder", "ganar"], tense: TENSES.FUTURE, dist: ["van", "vas", "ganando"] },
            { q: "Are you all going to be able to fly?", a: ["¿", "Ustedes", "van", "a", "poder", "volar", "?"], alt: ["¿", "Van", "ustedes", "a", "poder", "volar", "?"], alt2: ["¿", "Van", "a", "poder", "volar", "ustedes", "?"], alt3: ["¿", "Van", "a", "poder", "volar", "?"], tense: TENSES.FUTURE, dist: ["vamos", "pudo", "volado"] },
            { q: "We are not going to be able to clean.", a: ["Nosotros", "no", "vamos", "a", "poder", "limpiar"], alt: ["No", "vamos", "a", "poder", "limpiar"], tense: TENSES.FUTURE, dist: ["van", "pude", "limpiado"] },
            { q: "I am going to be able to rest.", a: ["Yo", "voy", "a", "poder", "descansar"], alt: ["Voy", "a", "poder", "descansar"], tense: TENSES.FUTURE, dist: ["vas", "puedo", "descansado"] },
            { q: "Are they going to be able to play?", a: ["¿", "Ellos", "van", "a", "poder", "jugar", "?"], alt: ["¿", "Van", "ellos", "a", "poder", "jugar", "?"], alt2: ["¿", "Van", "a", "poder", "jugar", "ellos", "?"], alt3: ["¿", "Van", "a", "poder", "jugar", "?"], tense: TENSES.FUTURE, dist: ["vamos", "pudo", "jugando"] },
            { q: "He is not going to be able to help.", a: ["Él", "no", "va", "a", "poder", "ayudar"], alt: ["No", "va", "a", "poder", "ayudar"], tense: TENSES.FUTURE, dist: ["voy", "pudiste", "ayudado"] },

            // Perfecto (13)
            { q: "I have been able to help.", a: ["Yo", "he", "podido", "ayudar"], alt: ["He", "podido", "ayudar"], tense: TENSES.PERFECT, dist: ["ha", "pude", "ayudado"] },
            { q: "You (inf) have not been able to sleep.", a: ["Tú", "no", "has", "podido", "dormir"], alt: ["No", "has", "podido", "dormir"], tense: TENSES.PERFECT, dist: ["hemos", "puedes", "duerme"] },
            { q: "Has he been able to read?", a: ["¿", "Él", "ha", "podido", "leer", "?"], alt: ["¿", "Ha", "él", "podido", "leer", "?"], alt2: ["¿", "Ha", "podido", "leer", "él", "?"], alt3: ["¿", "Ha", "podido", "leer", "?"], tense: TENSES.PERFECT, dist: ["han", "pude", "leyendo"] },
            { q: "We have been able to arrive.", a: ["Nosotros", "hemos", "podido", "llegar"], alt: ["Hemos", "podido", "llegar"], tense: TENSES.PERFECT, dist: ["ha", "podemos", "llegado"] },
            { q: "They have not been able to find.", a: ["Ellos", "no", "han", "podido", "encontrar"], alt: ["No", "han", "podido", "encontrar"], tense: TENSES.PERFECT, dist: ["he", "pudieron", "encontrado"] },
            { q: "Has she been able to choose?", a: ["¿", "Ella", "ha", "podido", "elegir", "?"], alt: ["¿", "Ha", "ella", "podido", "elegir", "?"], alt2: ["¿", "Ha", "podido", "elegir", "ella", "?"], alt3: ["¿", "Ha", "podido", "elegir", "?"], tense: TENSES.PERFECT, dist: ["has", "puedo", "elegido"] },
            { q: "You (formal) have been able to wait.", a: ["Usted", "ha", "podido", "esperar"], alt: ["Ha", "podido", "esperar"], tense: TENSES.PERFECT, dist: ["han", "hemos", "esperando"] },
            { q: "Have you all been able to jump?", a: ["¿", "Ustedes", "han", "podido", "saltar", "?"], alt: ["¿", "Han", "ustedes", "podido", "saltar", "?"], alt2: ["¿", "Han", "podido", "saltar", "ustedes", "?"], alt3: ["¿", "Han", "podido", "saltar", "?"], tense: TENSES.PERFECT, dist: ["has", "pudo", "saltado"] },
            { q: "We have not been able to understand.", a: ["Nosotros", "no", "hemos", "podido", "entender"], alt: ["No", "hemos", "podido", "entender"], tense: TENSES.PERFECT, dist: ["ha", "pueden", "entendido"] },
            { q: "I have been able to dream.", a: ["Yo", "he", "podido", "soñar"], alt: ["He", "podido", "soñar"], tense: TENSES.PERFECT, dist: ["has", "pudimos", "soñado"] },
            { q: "Have they been able to stay?", a: ["¿", "Ellos", "han", "podido", "quedarse", "?"], alt: ["¿", "Han", "ellos", "podido", "quedarse", "?"], alt2: ["¿", "Han", "podido", "quedarse", "ellos", "?"], alt3: ["¿", "Han", "podido", "quedarse", "?"], tense: TENSES.PERFECT, dist: ["hemos", "puedo", "quedado"] },
            { q: "She has not been able to cook.", a: ["Ella", "no", "ha", "podido", "cocinar"], alt: ["No", "ha", "podido", "cocinar"], tense: TENSES.PERFECT, dist: ["han", "pude", "cocinando"] },
            { q: "Have you (inf) been able to eat?", a: ["¿", "Tú", "has", "podido", "comer", "?"], alt: ["¿", "Has", "tú", "podido", "comer", "?"], alt2: ["¿", "Has", "podido", "comer", "tú", "?"], alt3: ["¿", "Has", "podido", "comer", "?"], tense: TENSES.PERFECT, dist: ["he", "puede", "comido"] }
        ].map((item, idx) => {
            const allWordsSet = new Set([...item.a, ...(item.alt || []), ...(item.alt2 || []), ...(item.alt3 || []), ...item.dist]);
            return {
                id: idx,
                ...item,
                shuffledWords: Array.from(allWordsSet).sort(() => Math.random() - 0.5)
            };
        });

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [step, setStep] = useState('auth'); 
            const [form, setForm] = useState({ firstName: '', lastName: '', email: '', period: '' });
            const [currentIdx, setCurrentIdx] = useState(0);
            const [responses, setResponses] = useState({}); 
            const [cheatCount, setCheatCount] = useState(0);
            const [showAlert, setShowAlert] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [lastViewedTense, setLastViewedTense] = useState(null);
            const [isLocalMode, setIsLocalMode] = useState(false);

            // Inicialización Segura de Firebase
            useEffect(() => {
                const init = async () => {
                    try {
                        if (!firebase.apps.length && firebaseConfig.apiKey) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        
                        if (firebase.apps.length) {
                            const result = await firebase.auth().signInAnonymously();
                            setUser(result.user);
                        } else {
                            console.warn("Iniciando en Modo Local (Sin Firebase)");
                            setIsLocalMode(true);
                            setUser({ uid: 'local-user' });
                        }
                    } catch (e) {
                        console.error("Firebase Auth Error:", e);
                        setIsLocalMode(true);
                        setUser({ uid: 'local-user' });
                    }
                };
                init();
            }, []);

            useEffect(() => {
                const handleVisibility = () => {
                    if (document.hidden && step === 'quiz') {
                        setCheatCount(prev => prev + 1);
                        setShowAlert(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [step]);

            const handleStart = async () => {
                if (!form.firstName || !form.lastName || !form.email || !form.period) return;
                
                if (!isLocalMode) {
                    const emailId = form.email.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
                    const internalAppId = (window.__app_id) || 'poder-quiz-v4';
                    try {
                        const docRef = firebase.firestore().collection('artifacts').doc(internalAppId).collection('public').doc('data').collection('submissions').doc(emailId);
                        const docSnap = await docRef.get();
                        if (docSnap.exists) {
                            alert("Acceso denegado: Ya has enviado este examen.");
                            return;
                        }
                    } catch (err) { 
                        console.error("Firestore error:", err);
                    }
                }
                
                setLastViewedTense(QUESTIONS_RAW[0].tense);
                setStep('learn');
            };

            const toggleWord = (word) => {
                const currentAns = responses[currentIdx] || [];
                if (currentAns.includes(word)) {
                    setResponses({ ...responses, [currentIdx]: currentAns.filter(w => w !== word) });
                } else {
                    setResponses({ ...responses, [currentIdx]: [...currentAns, word] });
                }
            };

            const nextQuestion = () => {
                const nextIdx = currentIdx + 1;
                if (nextIdx < QUESTIONS_RAW.length) {
                    const currentTense = QUESTIONS_RAW[currentIdx].tense;
                    const nextTense = QUESTIONS_RAW[nextIdx].tense;
                    setCurrentIdx(nextIdx);
                    if (nextTense !== currentTense) {
                        setLastViewedTense(nextTense);
                        setStep('learn');
                    }
                } else {
                    submitQuiz();
                }
            };

            const submitQuiz = async () => {
                setIsSubmitting(true);
                let scoreVal = 0;
                const log = QUESTIONS_RAW.map((q, idx) => {
                    const userStr = (responses[idx] || []).join(" ").toLowerCase();
                    const validVariations = [
                        q.a.join(" "),
                        q.alt?.join(" "),
                        q.alt2?.join(" "),
                        q.alt3?.join(" ")
                    ].filter(Boolean).map(v => v.toLowerCase());

                    const isCorrect = validVariations.includes(userStr);
                    if (isCorrect) scoreVal++;
                    return `${idx + 1}${isCorrect ? 'r' : 'w'}`;
                }).join(", ");

                const subData = {
                    title: QUIZ_TITLE,
                    timestamp: new Date().toLocaleString(),
                    firstName: form.firstName,
                    lastName: form.lastName,
                    email: form.email,
                    period: form.period,
                    rawScore: scoreVal,
                    displayScore: `${scoreVal}/${QUESTIONS_RAW.length}`,
                    cheatCount: cheatCount,
                    resultsLog: log
                };

                if (!isLocalMode) {
                    try {
                        const emailId = form.email.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
                        const internalAppId = (window.__app_id) || 'poder-quiz-v4';
                        await firebase.firestore().collection('artifacts').doc(internalAppId).collection('public').doc('data').collection('submissions').doc(emailId).set(subData);
                    } catch (err) { console.error("Cloud Save Error:", err); }
                }

                setStep('results');
                downloadCSV(subData);
                setIsSubmitting(false);
            };

            const downloadCSV = (data) => {
                const headers = ["Titulo", "Fecha/Hora", "Nombre", "Apellido", "Email", "Periodo", "Puntaje", "Detalle", "Trampas"];
                const row = [
                    data.title, data.timestamp, data.firstName, data.lastName, data.email, data.period,
                    `'${data.displayScore}`, data.resultsLog, data.cheatCount
                ].map(field => `"${field}"`).join(",");
                const csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + row;
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `resultados_${data.firstName}_${data.lastName}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Enter') {
                        if (step === 'quiz') nextQuestion();
                        else if (step === 'learn') setStep('quiz');
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [currentIdx, responses, step]);

            if (!user) return <div className="h-screen bg-lime-50 flex items-center justify-center font-bold text-lime-600 uppercase tracking-widest animate-pulse">Cargando aplicación...</div>;

            return (
                <div className="min-h-screen p-4 md:p-8 flex items-center justify-center">
                    {showAlert && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
                            <div className="bg-white rounded-2xl p-8 max-w-sm text-center shadow-2xl border-4 border-red-500">
                                <h2 className="text-2xl font-black text-slate-900 mb-2 uppercase tracking-tight">¡ALERTA!</h2>
                                <p className="text-slate-600 mb-6 font-medium">Salir de la pestaña queda registrado. Regresa al examen inmediatamente.</p>
                                <button onClick={() => setShowAlert(false)} className="w-full bg-red-500 text-white font-bold py-3 rounded-xl shadow-lg">Entendido</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-lime-100 min-h-[600px] flex flex-col relative">
                        <div className="bg-lime-500 p-6 text-white flex justify-between items-center shadow-md">
                            <h1 className="text-xl font-black uppercase tracking-tighter">{QUIZ_TITLE}</h1>
                            {step === 'quiz' && <div className="bg-white/20 px-4 py-1 rounded-full text-sm font-bold">Progreso: {currentIdx + 1} / 50</div>}
                        </div>

                        {step === 'auth' && (
                            <div className="p-10 flex-grow flex flex-col justify-center animate-in fade-in duration-300">
                                <div className="max-w-md mx-auto w-full space-y-6">
                                    <h2 className="text-3xl font-black text-slate-900 text-center">Registro</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500" placeholder="Nombre" value={form.firstName} onChange={e => setForm({...form, firstName: e.target.value})} />
                                        <input className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500" placeholder="Apellido" value={form.lastName} onChange={e => setForm({...form, lastName: e.target.value})} />
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500" placeholder="ID Estudiantil / Email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                                    <select className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500 font-bold" value={form.period} onChange={e => setForm({...form, period: e.target.value})}>
                                        <option value="">Selecciona tu periodo...</option>
                                        {['1st', 'A2', 'A4', 'B3', 'B4', '5th'].map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <button onClick={handleStart} disabled={!form.firstName || !form.lastName || !form.email || !form.period} className="w-full bg-lime-500 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-lime-600 transition-all active:scale-95 text-lg">EMPEZAR</button>
                                    {isLocalMode && <p className="text-xs text-amber-600 text-center font-bold">⚠️ Ejecutando en Modo Local (los resultados se descargarán pero no se subirán a la nube).</p>}
                                </div>
                            </div>
                        )}

                        {step === 'learn' && lastViewedTense && LEARNING_SLIDES[lastViewedTense] && (
                            <div className="p-10 flex-grow flex flex-col justify-center text-center space-y-8 learning-card">
                                <h2 className="text-4xl font-black text-lime-600 mb-6">{LEARNING_SLIDES[lastViewedTense].title}</h2>
                                <div className="bg-slate-50 p-8 rounded-3xl border-l-[12px] border-lime-400 text-left shadow-sm">
                                    <p className="text-xl leading-relaxed text-slate-700 font-medium mb-6">{LEARNING_SLIDES[lastViewedTense].desc}</p>
                                    <div className="space-y-4">
                                        {LEARNING_SLIDES[lastViewedTense].examples.map((ex, i) => (
                                            <div key={i} className="bg-white p-4 rounded-xl border border-lime-100">
                                                <div className="text-lime-700 font-black text-xl">{ex.s}</div>
                                                <div className="text-slate-500 italic text-sm">{ex.t}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => setStep('quiz')} className="bg-lime-500 text-white font-black py-5 px-20 rounded-2xl text-xl shadow-2xl hover:bg-lime-600 transition-all">Siguiente</button>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="p-8 flex-grow flex flex-col animate-in fade-in duration-300">
                                <div className="flex justify-between items-center mb-10">
                                    <span className="bg-lime-100 text-lime-700 px-6 py-2 rounded-full text-xs font-black uppercase border border-lime-200">{QUESTIONS_RAW[currentIdx].tense}</span>
                                    <span className="font-black text-slate-300 text-2xl">{currentIdx + 1} / 50</span>
                                </div>
                                <div className="text-center mb-12">
                                    <p className="text-xs font-bold text-slate-400 uppercase mb-3">Traduce:</p>
                                    <h2 className="text-4xl md:text-5xl font-black text-slate-900">{QUESTIONS_RAW[currentIdx].q}</h2>
                                </div>
                                <div className="min-h-[100px] bg-slate-50 rounded-3xl border-4 border-dotted border-lime-200 mb-10 flex flex-wrap gap-2.5 p-6 items-center justify-center">
                                    {(responses[currentIdx] || []).map((word, i) => (
                                        <button key={i} onClick={() => toggleWord(word)} className="bg-lime-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg text-lg">{word}</button>
                                    ))}
                                    {(responses[currentIdx] || []).length === 0 && <p className="text-slate-300 italic font-bold text-xl opacity-50">Toca las palabras para responder...</p>}
                                </div>
                                <div className="flex flex-wrap gap-3 justify-center mb-auto">
                                    {QUESTIONS_RAW[currentIdx].shuffledWords.map((word, i) => {
                                        const used = (responses[currentIdx] || []).includes(word);
                                        return (
                                            <button key={i} onClick={() => !used && toggleWord(word)} disabled={used} className={`px-6 py-4 rounded-2xl font-bold border-2 transition-all text-xl ${used ? 'bg-slate-50 text-slate-100 border-slate-50 opacity-20' : 'bg-white border-lime-200 text-lime-600 hover:bg-lime-50 shadow-md'}`}>{word}</button>
                                        );
                                    })}
                                </div>
                                <div className="flex justify-between items-center mt-12 pt-8 border-t-2 border-slate-50">
                                    <button onClick={() => currentIdx > 0 && setCurrentIdx(currentIdx-1)} disabled={currentIdx === 0} className="font-black text-slate-300 hover:text-lime-500 transition-colors uppercase text-sm">Anterior</button>
                                    <button onClick={nextQuestion} disabled={isSubmitting} className="bg-slate-800 text-white px-16 py-5 rounded-3xl font-black shadow-2xl hover:bg-slate-900 transition-all active:scale-95 uppercase">
                                        {isSubmitting ? 'Guardando...' : (currentIdx === 49 ? 'Finalizar' : 'Siguiente')}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'results' && (
                            <div className="p-16 flex-grow flex flex-col justify-center text-center space-y-10 animate-in zoom-in duration-700">
                                <h2 className="text-6xl font-black text-slate-900 tracking-tighter uppercase">¡Terminado!</h2>
                                <p className="text-2xl text-slate-500 font-medium max-w-lg mx-auto leading-relaxed">Tus resultados han sido procesados y el archivo CSV se ha descargado automáticamente.</p>
                                <button onClick={() => window.location.reload()} className="max-w-md mx-auto w-full bg-slate-800 text-white py-6 rounded-3xl font-black hover:bg-slate-900 transition-all shadow-2xl uppercase tracking-widest text-xl">Reiniciar</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
