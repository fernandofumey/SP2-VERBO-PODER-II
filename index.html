<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominando 'Poner' - Examen Interactivo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

</head>
<body class="bg-pattern text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIGURACIÓN GLOBAL ---
        const QUIZ_TITLE = "Mastering the Verb 'Poner' - Spanish II";
        const apiKey = ""; 

        // Definición global para evitar ReferenceErrors
        window.isFirebaseAvailable = false;
        window.db = null;
        window.auth = null;
        
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        try {
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
            if (config && config.apiKey) {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                window.db = firebase.firestore();
                window.auth = firebase.auth();
                window.isFirebaseAvailable = true;
            }
        } catch (e) {
            console.error("Firebase no disponible.");
        }

        const internalAppId = typeof __app_id !== 'undefined' ? __app_id : 'poner-quiz-v1';

        // --- UTILIDADES ---
        const normalizeText = (str) => {
            if (!str) return "";
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        };

        function pcmToWav(base64Data, sampleRate = 24000) {
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) { byteNumbers[i] = byteCharacters.charCodeAt(i); }
            const byteArray = new Uint8Array(byteNumbers);
            const buffer = byteArray.buffer;
            const length = buffer.byteLength;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); 
            view.setUint32(4, 36 + length, true); 
            view.setUint32(8, 0x57415645, false); 
            view.setUint32(12, 0x666d7420, false); 
            view.setUint32(16, 16, true); 
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true); 
            view.setUint32(28, sampleRate * 2, true); 
            view.setUint16(32, 2, true); 
            view.setUint16(34, 16, true); 
            view.setUint32(36, 0x64617461, false); 
            view.setUint32(40, length, true); 
            const combined = new Uint8Array(44 + length);
            combined.set(new Uint8Array(wavHeader), 0);
            combined.set(new Uint8Array(buffer), 44);
            return combined;
        }

        // --- CONTENIDO ---
        const TENSES = {
            PRESENT: "Indicative Present",
            PRETERITE: "Indicative Preterite",
            CONTINUOUS: "Indicative Present Continuous",
            FUTURE: "Indicative Informal Future"
        };

        const LEARNING_SLIDES = {
            [TENSES.PRESENT]: {
                title: "Poner in the Indicative Present",
                desc: "The verb 'poner' (to put/place) has an irregular 'Yo' form: 'Pongo'. When talking about putting something on yourself, use 'me pongo', 'te pones', 'se pone'.",
                examples: [
                    { s: "Yo pongo la sal en la mesa.", t: "Translation: I put the salt on the table." },
                    { s: "Él se pone el sombrero.", t: "Translation: He puts the hat on (himself)." }
                ]
            },
            [TENSES.PRETERITE]: {
                title: "Poner in the Indicative Preterite",
                desc: "The preterite uses the stem 'pus-'. It is completely irregular: puse, pusiste, puso, pusimos, pusieron.",
                examples: [
                    { s: "Yo puse la leche en la nevera.", t: "Translation: I put the milk in the fridge." },
                    { s: "Ellos pusieron las llaves en la mesa.", t: "Translation: They put the keys on the table." }
                ]
            },
            [TENSES.CONTINUOUS]: {
                title: "Poner in the Present Continuous",
                desc: "Uses 'Estar + Poniendo'. Action happening now.",
                examples: [
                    { s: "Estoy poniendo la mesa.", t: "Translation: I am setting (putting) the table." },
                    { s: "Él se está poniendo los zapatos.", t: "Translation: He is putting on the shoes." }
                ]
            },
            [TENSES.FUTURE]: {
                title: "Poner in the Informal Future",
                desc: "Uses 'Ir + a + Poner'. Examples: voy a poner, vas a poner...",
                examples: [
                    { s: "Voy a poner el pedido.", t: "Translation: I am going to put the order in." },
                    { s: "Ella se va a poner el vestido rojo.", t: "Translation: She is going to put on the red dress." }
                ]
            }
        };

        const QUESTIONS_RAW = [
            // PRESENT (1-12)
            { type: 'drag', q: "I put the salt on the table.", a: ["Yo", "pongo", "la", "sal", "en", "la", "mesa"], dist: ["puse", "pones", "poniendo"], tense: TENSES.PRESENT },
            { type: 'mcq', q: "Translation: 'We put the books away.'", a: "Nosotros ponemos los libros.", options: ["Nosotros ponemos los libros.", "Nosotros pusimos los libros.", "Nosotros pongo los libros.", "Nosotros ponen los libros."], tense: TENSES.PRESENT },
            { type: 'tf', q: "The 'Yo' form of poner in the present is 'Pongo'.", a: "True", tense: TENSES.PRESENT },
            { type: 'blank', q: "Ustedes ___ (put - present) mucha sal en la comida.", a: ["ponen"], tense: TENSES.PRESENT },
            { type: 'audio', q: "Identify translation.", audioText: "No pongo nada en la caja.", a: "I don't put anything in the box.", options: ["I put everything inside the wooden box.", "I don't put anything in the box.", "I put nothing at all on the shelf.", "He doesn't put anything in the yellow box."], tense: TENSES.PRESENT },
            { type: 'drag', q: "Translate: 'He puts the hat on.'", a: ["Él", "se", "pone", "el", "sombrero"], dist: ["puse", "pone", "poniendo"], tense: TENSES.PRESENT },
            { type: 'drag', q: "Translate: 'Do you (inf) put the clothes in the drawer?'", a: ["¿", "Pones", "tú", "la", "ropa", "en", "el", "cajón", "?"], alt: ["¿", "Pones", "la", "ropa", "en", "el", "cajón", "?"], dist: ["puse", "ponen", "llave"], tense: TENSES.PRESENT },
            { type: 'mcq', q: "Translate: 'They (f) put on the shoes.'", a: "Ellas se ponen los zapatos.", options: ["Ellas pone los zapatos.", "Ellas se ponen los zapatos.", "Ellas pusimos los zapatos.", "Ellas pongo los zapatos."], tense: TENSES.PRESENT },
            { type: 'tf', q: "'Se pone' is used for reflexive actions.", a: "True", tense: TENSES.PRESENT },
            { type: 'blank', q: "Él no ___ (put - present) atención en la clase.", a: ["pone"], tense: TENSES.PRESENT },
            { type: 'audio', q: "Identify audio.", audioText: "¿Qué pones en la mesa?", a: "What do you put on the table?", options: ["What did you put near the dining table?", "What do you put on the table?", "Who is putting the glasses on the table?", "Where do you put the flowers today?"], tense: TENSES.PRESENT },
            { type: 'drag', q: "We put the sugar in the coffee.", a: ["Nosotros", "ponemos", "el", "azúcar", "en", "el", "café"], dist: ["poniendo", "puse", "ponen"], tense: TENSES.PRESENT },

            // PRETERITE (13-25)
            { type: 'drag', q: "I put the milk in the fridge.", a: ["Yo", "puse", "la", "leche", "en", "la", "nevera"], dist: ["pongo", "pusiste", "poniendo"], tense: TENSES.PRETERITE },
            { type: 'mcq', q: "They put the boxes in the car.", a: "Ellos pusieron las cajas en el coche.", options: ["Ellos ponen las cajas.", "Ellos pusieron las cajas en el coche.", "Ellos pusimos las cajas.", "Ellos puso las cajas."], tense: TENSES.PRETERITE },
            { type: 'tf', q: "Preterite stem is 'pus-'.", a: "True", tense: TENSES.PRETERITE },
            { type: 'blank', q: "Tú ___ (put - preterite) el vaso en el suelo.", a: ["pusiste"], tense: TENSES.PRETERITE },
            { type: 'audio', q: "Translate audio.", audioText: "No puse el reloj en la mesa.", a: "I didn't put the watch on the table.", options: ["I don't put the silver watch on the desk.", "I didn't put the watch on the table.", "He didn't put the small watch on the table.", "We didn't put the watches near the table."], tense: TENSES.PRETERITE },
            { type: 'drag', q: "Translate: 'We put the ornaments on the tree.'", a: ["Nosotros", "pusimos", "los", "adornos", "en", "el", "árbol"], dist: ["ponemos", "ponen", "puesto"], tense: TENSES.PRETERITE },
            { type: 'drag', q: "Did she put the money in the bag?", a: ["¿", "Puso", "ella", "el", "dinero", "en", "la", "bolsa", "?"], alt: ["¿", "Puso", "el", "dinero", "en", "la", "bolsa", "ella", "?"], dist: ["puse", "pone", "bolsa"], tense: TENSES.PRETERITE },
            { type: 'mcq', q: "Ustedes ___ the baggage.", a: "pusieron", options: ["puso", "pusieron", "pusimos", "ponen"], tense: TENSES.PRETERITE },
            { type: 'tf', q: "'Pusimos' refers to 'We'.", a: "True", tense: TENSES.PRETERITE },
            { type: 'blank', q: "Él se ___ (put on - preterite) su chaqueta.", a: ["puso"], tense: TENSES.PRETERITE },
            { type: 'audio', q: "Identify audio.", audioText: "¿Quién puso las llaves aquí?", a: "Who put the keys here?", options: ["Who puts the golden keys in this place?", "Who put the keys here?", "Where did you put the car keys today?", "What is the reason he put the keys here?"], tense: TENSES.PRETERITE },
            { type: 'drag', q: "We didn't put any obstacles.", a: ["Nosotros", "no", "pusimos", "trabas", "en", "el", "camino"], dist: ["ponen", "puso", "poner"], tense: TENSES.PRETERITE },
            { type: 'drag', q: "Translate: 'I put the keys on the table.'", a: ["Yo", "puse", "las", "llaves", "en", "la", "mesa"], dist: ["pongo", "pusieron", "sobre"], tense: TENSES.PRETERITE },

            // CONTINUOUS (26-37)
            { type: 'drag', q: "I am putting the clothes in the closet.", a: ["Estoy", "poniendo", "la", "ropa", "en", "el", "armario"], dist: ["puse", "pongo", "puesto"], tense: TENSES.CONTINUOUS },
            { type: 'mcq', q: "Translate: 'They are putting on the movie.'", a: "Están poniendo la película.", options: ["Están puesto la película.", "Están poniendo la película.", "Están ponen la película.", "Están pusimos la película."], tense: TENSES.CONTINUOUS },
            { type: 'tf', q: "The gerund is 'poniendo'.", a: "True", tense: TENSES.CONTINUOUS },
            { type: 'blank', q: "Tú ___ (are putting) las flores en el jarrón.", a: ["estás", "poniendo"], tense: TENSES.CONTINUOUS },
            { type: 'audio', q: "Identify audio.", audioText: "No estamos poniendo música ahora.", a: "We aren't putting music on now.", options: ["We don't put the loud music on the radio.", "We aren't putting music on now.", "They aren't putting the classical music now.", "I'm not putting any music in the living room."], tense: TENSES.CONTINUOUS },
            { type: 'drag', q: "Translate: 'He is putting the baby in the crib.'", a: ["Él", "está", "poniendo", "al", "bebé", "en", "la", "cuna"], dist: ["puse", "pone", "puesto"], tense: TENSES.CONTINUOUS },
            { type: 'drag', q: "Are you all putting the chair in the corner?", a: ["¿", "Están", "ustedes", "poniendo", "la", "silla", "en", "la", "esquina", "?"], alt: ["¿", "Están", "poniendo", "ustedes", "la", "silla", "en", "la", "esquina", "?"], dist: ["puse", "ponen", "asiento"], tense: TENSES.CONTINUOUS },
            { type: 'mcq', q: "Ella ___ the star on the tree.", a: "está poniendo", options: ["está pone", "está puso", "está poniendo", "está ponen"], tense: TENSES.CONTINUOUS },
            { type: 'tf', q: "'Se' can come before 'está'.", a: "True", tense: TENSES.CONTINUOUS },
            { type: 'blank', q: "Usted ___ (are putting) las cartas en el buzón.", a: ["está", "poniendo"], tense: TENSES.CONTINUOUS },
            { type: 'audio', q: "Translate audio.", audioText: "¿Qué estás poniendo en la bolsa?", a: "What are you putting in the bag?", options: ["What did you put inside the school bag?", "What are you putting in the bag?", "Who is putting the heavy books in the bag?", "How are you putting the groceries in the bag?"], tense: TENSES.CONTINUOUS },
            { type: 'drag', q: "We are setting the table.", a: ["Estamos", "poniendo", "la", "mesa"], dist: ["puse", "puesto", "ponemos"], tense: TENSES.CONTINUOUS },

            // FUTURE (38-50)
            { type: 'drag', q: "I am going to put the order in the system.", a: ["Yo", "voy", "a", "poner", "el", "pedido", "en", "el", "sistema"], dist: ["puse", "pongo", "irá"], tense: TENSES.FUTURE },
            { type: 'mcq', q: "They are going to put more lights.", a: "Van a poner más luces.", options: ["Van a puse más luces.", "Van a poner más luces.", "Van a pongo más luces.", "Van a pondrán más luces."], tense: TENSES.FUTURE },
            { type: 'tf', q: "Future uses 'ir + a + infinitive'.", a: "True", tense: TENSES.FUTURE },
            { type: 'blank', q: "Tú ___ (going to put) el cartel en la pared.", a: ["vas", "a", "poner"], tense: TENSES.FUTURE },
            { type: 'audio', q: "Identify audio.", audioText: "No voy a poner eso en mi mochila.", a: "I'm not going to put that in my backpack.", options: ["I didn't put the blue notebook in my backpack.", "I'm not going to put that in my backpack.", "He is not going to put his toys in my backpack.", "We aren't going to put the lunch in the backpack."], tense: TENSES.FUTURE },
            { type: 'drag', q: "Translate: 'She is going to put on the red dress.'", a: ["Ella", "se", "va", "a", "poner", "el", "vestido", "rojo"], dist: ["puse", "poniendo", "pone", "azul"], tense: TENSES.FUTURE },
            { type: 'drag', q: "Are you going to put the code in the door?", a: ["¿", "Vas", "a", "poner", "el", "código", "en", "la", "puerta", "?"], dist: ["puse", "pongo", "clave"], tense: TENSES.FUTURE },
            { type: 'mcq', q: "Ustedes ___ a lot of effort.", a: "van a poner", options: ["va a poner", "van a poner", "vamos a poner", "ir a poner"], tense: TENSES.FUTURE },
            { type: 'tf', q: "'Se va a poner' is correct.", a: "True", tense: TENSES.FUTURE },
            { type: 'blank', q: "Él ___ (going to put on) los guantes.", a: ["se", "va", "a", "poner"], tense: TENSES.FUTURE },
            { type: 'audio', q: "Translate audio.", audioText: "¿Van a poner música en la fiesta?", a: "Are they going to put music on at the party?", options: ["Are they putting festive music at the big party?", "Are they going to put music on at the party?", "Did they put the disco music for the party?", "Do they put the soft music during the party?"], tense: TENSES.FUTURE },
            { type: 'drag', q: "We are going to put the fence.", a: ["Vamos", "a", "poner", "la", "valla", "alrededor", "del", "jardín"], dist: ["puse", "poniendo", "puedo"], tense: TENSES.FUTURE },
            { type: 'drag', q: "Translate: 'He is going to put the trash out.'", a: ["Él", "va", "a", "poner", "la", "basura", "afuera"], dist: ["puse", "pongo", "dentro"], tense: TENSES.FUTURE }
        ];

        // --- PROCESAMIENTO ---
        const QUESTIONS = QUESTIONS_RAW.map((item, idx) => {
            const safeDist = Array.isArray(item.dist) ? item.dist : [];
            const safeA = Array.isArray(item.a) ? item.a : [];
            const safeAlt = Array.isArray(item.alt) ? item.alt : [];
            let bank = [];
            if (item.type === 'drag') {
                bank = [...safeA, ...safeAlt, ...safeDist].map((word, i) => ({ text: word, id: `w-${idx}-${i}` }));
                bank.sort(() => Math.random() - 0.5);
            }
            let shuffledOptions = [];
            if (item.options) { shuffledOptions = [...item.options].sort(() => Math.random() - 0.5); }
            return { ...item, id: idx, bank, shuffledOptions };
        });

        function App() {
            const [user, setUser] = useState(null);
            const [step, setStep] = useState('auth'); 
            const [form, setForm] = useState({ firstName: '', lastName: '', email: '', period: '' });
            const [currentIdx, setCurrentIdx] = useState(0);
            const [responses, setResponses] = useState({}); 
            const [cheatCount, setCheatCount] = useState(0);
            const [showAlert, setShowAlert] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [lastViewedTense, setLastViewedTense] = useState(null);

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (!user) setUser({ uid: 'local-' + Date.now() });
                }, 1000);

                if (window.isFirebaseAvailable && window.auth) {
                    const unsub = window.auth.onAuthStateChanged(u => { if (u) setUser(u); });
                    window.auth.signInAnonymously().catch(() => {});
                    return () => { unsub(); clearTimeout(timer); };
                } else {
                    setUser({ uid: 'local-user' });
                    clearTimeout(timer);
                }
            }, []);

            const handleStart = async () => {
                if (!form.firstName || !form.lastName || !form.email || !form.period) return;
                if (window.isFirebaseAvailable && window.db && user && !user.uid.startsWith('local')) {
                    const emailId = form.email.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
                    try {
                        const snap = await window.db.doc(`artifacts/${internalAppId}/public/data/submissions/${emailId}`).get();
                        if (snap.exists) { alert("Ya has enviado este examen."); return; }
                    } catch (e) {}
                }
                setLastViewedTense(QUESTIONS[0].tense);
                setStep('learn');
            };

            const toggleWord = (wordObj) => {
                const currentArr = responses[currentIdx] || [];
                if (currentArr.some(w => w.id === wordObj.id)) {
                    setResponses({ ...responses, [currentIdx]: currentArr.filter(w => w.id !== wordObj.id) });
                } else {
                    setResponses({ ...responses, [currentIdx]: [...currentArr, wordObj] });
                }
            };

            const nextQuestion = () => {
                const nextIdx = currentIdx + 1;
                if (nextIdx < QUESTIONS.length) {
                    const curT = QUESTIONS[currentIdx].tense;
                    const nxtT = QUESTIONS[nextIdx].tense;
                    setCurrentIdx(nextIdx);
                    if (curT !== nxtT) { setLastViewedTense(nxtT); setStep('learn'); }
                } else { submitQuiz(); }
            };

            const submitQuiz = async () => {
                setIsSubmitting(true);
                let scoreVal = 0;
                const log = QUESTIONS.map((q, idx) => {
                    let correct = false;
                    const res = responses[idx];
                    if (!res) return `${idx + 1}w`;
                    if (q.type === 'drag') {
                        const userStr = normalizeText(res.map(w => w.text).join(" "));
                        const variations = [q.a.join(" "), q.alt?.join(" ")].filter(Boolean).map(v => normalizeText(v));
                        correct = variations.includes(userStr);
                    } else if (q.type === 'blank') {
                        const userInp = normalizeText(typeof res === 'string' ? res : "");
                        correct = q.a.map(v => normalizeText(v)).includes(userInp);
                    } else { correct = normalizeText(res) === normalizeText(q.a); }
                    if (correct) scoreVal++;
                    return `${idx + 1}${correct ? 'r' : 'w'}`;
                }).join(", ");

                const subData = {
                    title: QUIZ_TITLE, timestamp: new Date().toLocaleString(),
                    firstName: form.firstName, lastName: form.lastName,
                    email: form.email, period: form.period,
                    displayScore: `${scoreVal}/50`, cheatCount, resultsLog: log
                };

                if (window.isFirebaseAvailable && window.db && user && !user.uid.startsWith('local')) {
                    try {
                        const emailId = form.email.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
                        await window.db.doc(`artifacts/${internalAppId}/public/data/submissions/${emailId}`).set(subData);
                    } catch (e) {}
                }
                setStep('results');
                downloadCSV(subData);
                setIsSubmitting(false);
            };

            const downloadCSV = (data) => {
                const headers = ["Titulo", "Fecha", "Nombre", "Apellido", "Email", "Periodo", "Puntaje", "Log", "Trampas"];
                const row = [data.title, data.timestamp, data.firstName, data.lastName, data.email, data.period, `'${data.displayScore}`, data.resultsLog, data.cheatCount].map(f => `"${f}"`).join(",");
                const csv = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + row;
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csv));
                link.setAttribute("download", `results_poner_${data.lastName}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handlePlayAudio = async (text) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    const b64 = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (b64) {
                        const blob = new Blob([pcmToWav(b64)], { type: 'audio/wav' });
                        const audio = new Audio(URL.createObjectURL(blob));
                        audio.play();
                    }
                } catch (e) {}
            };

            if (!user) return <div className="h-screen bg-lime-50 flex items-center justify-center font-bold text-lime-600 animate-pulse text-2xl uppercase tracking-widest px-4 text-center">Iniciando seguridad...</div>;

            const q = QUESTIONS[currentIdx];

            return (
                <div className="min-h-screen p-4 md:p-8 flex items-center justify-center">
                    {showAlert && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
                            <div className="bg-white rounded-3xl p-10 max-w-sm text-center shadow-2xl border-4 border-red-500">
                                <h2 className="text-3xl font-black text-slate-900 mb-2 uppercase">¡ALERTA!</h2>
                                <p className="text-slate-600 mb-6 font-medium">No cambies de pestaña.</p>
                                <button onClick={() => setShowAlert(false)} className="w-full bg-red-500 text-white font-bold py-4 rounded-2xl shadow-lg">Continuar</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-lime-100 min-h-[600px] flex flex-col relative bg-pattern">
                        <div className="bg-lime-500 p-6 text-white flex justify-between items-center shadow-md">
                            <h1 className="text-xl font-black uppercase tracking-widest">{QUIZ_TITLE}</h1>
                            {step === 'quiz' && <div className="bg-white/20 px-4 py-1 rounded-full text-sm font-bold">Paso {currentIdx + 1} de 50</div>}
                        </div>

                        {step === 'auth' && (
                            <div className="p-10 flex-grow flex flex-col justify-center animate-in fade-in">
                                <div className="max-w-md mx-auto w-full space-y-6">
                                    <h2 className="text-3xl font-black text-slate-900 text-center uppercase">Ingreso</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500 font-medium shadow-sm" placeholder="Nombre" value={form.firstName} onChange={e => setForm({...form, firstName: e.target.value})} />
                                        <input className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500 font-medium shadow-sm" placeholder="Apellido" value={form.lastName} onChange={e => setForm({...form, lastName: e.target.value})} />
                                    </div>
                                    <input className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500 font-medium shadow-sm" placeholder="Email Estudiantil" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                                    <select className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-lime-500 font-bold shadow-sm" value={form.period} onChange={e => setForm({...form, period: e.target.value})}>
                                        <option value="">Selecciona tu periodo...</option>
                                        {['1st', 'A2', 'A4', 'B3', 'B4', '5th'].map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <button onClick={handleStart} disabled={!form.firstName || !form.lastName || !form.email || !form.period} className="w-full bg-lime-500 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-lime-600 transition-all uppercase tracking-widest text-lg">Comenzar</button>
                                </div>
                            </div>
                        )}

                        {step === 'learn' && lastViewedTense && (
                            <div className="p-10 flex-grow flex flex-col justify-center text-center space-y-8 learning-card">
                                <h2 className="text-4xl font-black text-lime-600 uppercase tracking-tight">{LEARNING_SLIDES[lastViewedTense].title}</h2>
                                <div className="bg-white p-8 rounded-3xl border-l-[12px] border-lime-400 text-left shadow-lg">
                                    <p className="text-xl leading-relaxed text-slate-700 font-medium mb-6">{LEARNING_SLIDES[lastViewedTense].desc}</p>
                                    <div className="space-y-4">
                                        {LEARNING_SLIDES[lastViewedTense].examples.map((ex, i) => (
                                            <div key={i} className="bg-slate-50 p-4 rounded-xl border border-lime-100">
                                                <div className="text-lime-700 font-black text-xl">{ex.s}</div>
                                                <div className="text-slate-400 italic text-sm">{ex.t}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => setStep('quiz')} className="bg-lime-500 text-white font-black py-5 px-20 rounded-2xl text-xl shadow-2xl hover:bg-lime-600 uppercase">Siguiente</button>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="p-8 flex-grow flex flex-col animate-in fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="bg-lime-100 text-lime-700 px-4 py-1 rounded-full text-xs font-black uppercase border border-lime-200">{q.tense}</span>
                                </div>
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-black text-slate-900 leading-tight">{q.q}</h2>
                                </div>

                                {q.type === 'audio' && (
                                    <div className="flex justify-center mb-8">
                                        <button onClick={() => handlePlayAudio(q.audioText)} className="bg-slate-800 text-white p-8 rounded-full hover:bg-slate-700 shadow-2xl flex items-center gap-4 active:scale-90 transition-all">
                                            <svg className="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M11 5L6 9H2v2h4l5 4V5zM14.5 10c0-1.5-1-2.5-1-2.5v5s1-1 1-2.5z"/></svg>
                                            <span className="text-xl font-black uppercase tracking-widest text-white">Play Audio</span>
                                        </button>
                                    </div>
                                )}

                                <div className="flex-grow flex flex-col justify-center">
                                    {q.type === 'drag' && (
                                        <>
                                            <div className="min-h-[110px] bg-white rounded-3xl border-4 border-dotted border-lime-200 mb-8 flex flex-wrap gap-2.5 p-6 items-center justify-center shadow-inner">
                                                {(responses[currentIdx] || []).map((wordObj) => (
                                                    <button key={wordObj.id} onClick={() => toggleWord(wordObj)} className="bg-lime-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg text-lg border-b-4 border-lime-700 animate-in zoom-in">{wordObj.text}</button>
                                                ))}
                                            </div>
                                            <div className="flex flex-wrap gap-3 justify-center mb-auto">
                                                {q.bank.map((wordObj) => {
                                                    const used = (responses[currentIdx] || []).some(w => w.id === wordObj.id);
                                                    return <button key={wordObj.id} onClick={() => !used && toggleWord(wordObj)} disabled={used} className={`px-6 py-4 rounded-2xl font-bold border-2 transition-all text-xl shadow-sm ${used ? 'bg-slate-50 text-slate-100 border-slate-50 opacity-20 scale-90' : 'bg-white border-lime-200 text-lime-600 hover:border-lime-500 hover:bg-lime-50'}`}>{wordObj.text}</button>
                                                })}
                                            </div>
                                        </>
                                    )}

                                    {(q.type === 'mcq' || q.type === 'audio') && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-auto">
                                            {q.shuffledOptions.map(opt => (
                                                <button key={opt} onClick={() => setResponses({...responses, [currentIdx]: opt})} className={`p-6 rounded-2xl font-bold border-4 text-left transition-all text-lg shadow-sm ${responses[currentIdx] === opt ? 'bg-lime-500 text-white border-lime-600 scale-95 shadow-lg' : 'bg-white border-slate-100 text-slate-700 hover:border-lime-200'}`}>{opt}</button>
                                            ))}
                                        </div>
                                    )}

                                    {q.type === 'tf' && (
                                        <div className="flex gap-8 justify-center mb-auto pt-10">
                                            {["True", "False"].map(val => (
                                                <button key={val} onClick={() => setResponses({...responses, [currentIdx]: val})} className={`px-16 py-10 rounded-3xl font-black text-3xl border-4 transition-all shadow-md ${responses[currentIdx] === val ? 'bg-lime-500 text-white border-lime-600 shadow-xl scale-105' : 'bg-white border-slate-100 text-slate-700 hover:border-slate-50'}`}>{val === "True" ? "CIERTO" : "FALSO"}</button>
                                            ))}
                                        </div>
                                    )}

                                    {q.type === 'blank' && (
                                        <div className="mb-auto pt-10 text-center">
                                            <input 
                                                className="w-full max-w-lg p-8 text-3xl font-black text-center bg-white border-4 border-lime-200 rounded-[40px] outline-none focus:border-lime-500 text-lime-700 shadow-xl" 
                                                placeholder="Respuesta..."
                                                value={responses[currentIdx] || ""}
                                                onChange={(e) => setResponses({...responses, [currentIdx]: e.target.value})}
                                            />
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-between items-center mt-12 pt-8 border-t-2 border-slate-100">
                                    <button onClick={() => currentIdx > 0 && setCurrentIdx(currentIdx-1)} disabled={currentIdx === 0} className="font-black text-slate-300 hover:text-lime-500 uppercase tracking-widest disabled:opacity-0 transition-colors">Atrás</button>
                                    <button onClick={nextQuestion} disabled={isSubmitting} className="bg-slate-800 text-white px-20 py-5 rounded-3xl font-black shadow-2xl hover:bg-slate-900 transition-all active:scale-95 uppercase tracking-widest text-lg">
                                        {isSubmitting ? 'Guardando...' : (currentIdx === 49 ? 'Finalizar' : 'Siguiente')}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'results' && (
                            <div className="p-16 flex-grow flex flex-col justify-center text-center space-y-10 animate-in zoom-in duration-700">
                                <div className="w-32 h-32 bg-lime-100 rounded-full flex items-center justify-center mx-auto shadow-inner border-4 border-lime-200 animate-bounce">
                                    <svg className="w-16 h-16 text-lime-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7" /></svg>
                                </div>
                                <div>
                                    <h2 className="text-6xl font-black text-slate-900 tracking-tighter uppercase mb-4">¡LOGRADO!</h2>
                                    <p className="text-2xl text-slate-500 font-medium max-w-lg mx-auto leading-relaxed">Tus resultados han sido guardados.</p>
                                </div>
                                <button onClick={() => window.location.reload()} className="max-w-md mx-auto w-full bg-slate-800 text-white py-6 rounded-3xl font-black hover:bg-slate-900 transition-all shadow-2xl uppercase tracking-widest text-xl active:scale-95">Reiniciar</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
