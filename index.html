<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominando 'Poner' - Examen de Español II</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f7fee7; }
        .bg-pattern {
            background-image: radial-gradient(#d9f99d 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .word-btn:active { transform: scale(0.95); }
        .quiz-card { min-height: 600px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-pattern text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN ---
        const QUIZ_TITLE = "Mastering the Verb 'Poner' - Spanish II";
        const googleSheetUrl = "https://script.google.com/macros/s/AKfycbylNIqbY2UFGAeEWFeWF0kv2jjV3otBmO7LIdXnRt3zzQT-H1RxlWsbtmfmFJhWw92tlw/exec";
        const apiKey = ""; 

        // Firebase Setup
        window.isFirebaseAvailable = false;
        try {
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "" };
            if (config.apiKey) {
                if (!firebase.apps.length) firebase.initializeApp(config);
                window.db = firebase.firestore();
                window.auth = firebase.auth();
                window.isFirebaseAvailable = true;
            }
        } catch (e) { console.warn("Modo Local"); }

        const internalAppId = 'poner-mastery-vfinal';

        // --- UTILIDADES ---
        const normalizeText = (str) => {
            if (!str) return "";
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        };

        function pcmToWav(base64Data) {
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) { byteNumbers[i] = byteCharacters.charCodeAt(i); }
            const byteArray = new Uint8Array(byteNumbers);
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + byteArray.length, true);
            view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
            view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, 24000, true);
            view.setUint32(28, 24000 * 2, true); view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); view.setUint32(36, 0x64617461, false);
            view.setUint32(40, byteArray.length, true);
            const combined = new Uint8Array(44 + byteArray.length);
            combined.set(new Uint8Array(wavHeader), 0);
            combined.set(byteArray, 44);
            return combined;
        }

        const TENSES = {
            PRESENT: "Indicative Present",
            PRETERITE: "Indicative Preterite",
            CONTINUOUS: "Indicative Present Continuous",
            FUTURE: "Indicative Informal Future"
        };

        const LEARNING_SLIDES = {
            [TENSES.PRESENT]: {
                title: "Poner in the Indicative Present",
                desc: "Irregular 'Yo' form: 'Pongo'. For clothes/items on yourself, use the reflexive pronouns: me pongo, te pones, se pone...",
                examples: [
                    { s: "Yo pongo la sal en la mesa.", t: "I put the salt on the table." },
                    { s: "Tú te pones la chaqueta.", t: "You put on the jacket." }
                ]
            },
            [TENSES.PRETERITE]: {
                title: "Poner in the Indicative Preterite",
                desc: "Irregular stem: 'pus-'. Forms: puse, pusiste, puso, pusimos, pusieron.",
                examples: [
                    { s: "Puse las llaves allí.", t: "I put the keys there." },
                    { s: "Ellos se pusieron los zapatos.", t: "They put on the shoes." }
                ]
            },
            [TENSES.CONTINUOUS]: {
                title: "Poner in the Present Continuous",
                desc: "Uses 'Estar + Poniendo'. Reflexives go before 'estar'.",
                examples: [
                    { s: "Estamos poniendo la mesa.", t: "We are setting the table." },
                    { s: "Ella se está poniendo el sombrero.", t: "She is putting on the hat." }
                ]
            },
            [TENSES.FUTURE]: {
                title: "Poner in the Informal Future",
                desc: "Uses 'Ir + a + Poner'.",
                examples: [
                    { s: "Voy a poner el disco.", t: "I am going to put the record on." },
                    { s: "Él se va a poner la camisa roja.", t: "He is going to put on the red shirt." }
                ]
            }
        };

        const QUESTIONS_RAW = [
            // PRESENT (1-12)
            { type: 'drag', q: "I put the salt on the table.", a: ["Yo", "pongo", "la", "sal", "en", "la", "mesa"], dist: ["puse", "pones"], tense: TENSES.PRESENT },
            { type: 'mcq', q: "Select: 'We put the books away.'", a: "Nosotros ponemos los libros.", options: ["Nosotros ponemos los libros.", "Nosotros pusimos los libros.", "Nosotros pongo los libros.", "Nosotros ponen los libros."], tense: TENSES.PRESENT },
            { type: 'tf', q: "The 'Yo' form of poner in the present is 'Pongo'.", a: "True", tense: TENSES.PRESENT },
            { type: 'blank', q: "Ustedes ___ (put - present) mucha sal en la comida.", a: ["ponen"], tense: TENSES.PRESENT },
            { type: 'audio', q: "Identify translation.", audioText: "No pongo nada en la caja.", a: "I don't put anything in the box.", options: ["I put everything inside the wooden box.", "I don't put anything in the box.", "I put nothing at all on the shelf.", "He doesn't put anything in the yellow box."], tense: TENSES.PRESENT },
            { type: 'drag', q: "Translate: 'He puts the hat on.'", a: ["Él", "se", "pone", "el", "sombrero"], dist: ["puse", "pone"], tense: TENSES.PRESENT },
            { type: 'drag', q: "Translate: 'Do you (inf) put the clothes in the drawer?'", a: ["¿", "Pones", "tú", "la", "ropa", "en", "el", "cajón", "?"], dist: ["puse", "pone"], tense: TENSES.PRESENT },
            { type: 'mcq', q: "Translate: 'They (f) put on the shoes.'", a: "Ellas se ponen los zapatos.", options: ["Ellas se ponen los zapatos.", "Ellas pone los zapatos.", "Ellas pusimos los zapatos.", "Ellas pongo los zapatos."], tense: TENSES.PRESENT },
            { type: 'tf', q: "'Se pone' is reflexive.", a: "True", tense: TENSES.PRESENT },
            { type: 'blank', q: "Él no ___ (put - present) atención en la clase.", a: ["pone"], tense: TENSES.PRESENT },
            { type: 'audio', q: "Identify audio.", audioText: "¿Qué pones en la mesa?", a: "What do you put on the table?", options: ["What did you put near the dining table?", "What do you put on the table?", "Who is putting the glasses on the table?", "Where do you put the flowers today?"], tense: TENSES.PRESENT },
            { type: 'drag', q: "We put the sugar in the coffee.", a: ["Nosotros", "ponemos", "el", "azúcar", "en", "el", "café"], dist: ["puse", "ponen"], tense: TENSES.PRESENT },

            // PRETERITE (13-25)
            { type: 'drag', q: "I put the milk in the fridge.", a: ["Yo", "puse", "la", "leche", "en", "la", "nevera"], dist: ["pongo", "pusiste"], tense: TENSES.PRETERITE },
            { type: 'mcq', q: "They put the boxes in the car.", a: "Ellos pusieron las cajas en el coche.", options: ["Ellos pusieron las cajas en el coche.", "Ellos ponen las cajas.", "Ellos pusimos las cajas.", "Ellos puso las cajas."], tense: TENSES.PRETERITE },
            { type: 'tf', q: "Preterite stem is 'pus-'.", a: "True", tense: TENSES.PRETERITE },
            { type: 'blank', q: "Tú ___ (put - preterite) el vaso en el suelo.", a: ["pusiste"], tense: TENSES.PRETERITE },
            { type: 'audio', q: "Translate audio.", audioText: "No puse el reloj en la mesa.", a: "I didn't put the watch on the table.", options: ["I didn't put the watch on the table.", "I don't put the silver watch on the desk.", "He didn't put the small watch on the table.", "We didn't put the watches near the table."], tense: TENSES.PRETERITE },
            { type: 'drag', q: "Translate: 'We put the ornaments on the tree.'", a: ["Nosotros", "pusimos", "los", "adornos", "en", "el", "árbol"], dist: ["ponemos", "ponen"], tense: TENSES.PRETERITE },
            { type: 'drag', q: "Did she put the money in the bag?", a: ["¿", "Puso", "ella", "el", "dinero", "en", "la", "bolsa", "?"], dist: ["puse", "pone"], tense: TENSES.PRETERITE },
            { type: 'mcq', q: "Ustedes ___ the baggage.", a: "pusieron", options: ["pusieron", "puso", "pusimos", "ponen"], tense: TENSES.PRETERITE },
            { type: 'tf', q: "'Pusimos' is plural.", a: "True", tense: TENSES.PRETERITE },
            { type: 'blank', q: "Él se ___ (put on - preterite) su chaqueta.", a: ["puso"], tense: TENSES.PRETERITE },
            { type: 'audio', q: "Identify audio.", audioText: "¿Quién puso las llaves aquí?", a: "Who put the keys here?", options: ["Who put the keys here?", "Who puts the golden keys in this place?", "Where did you put the car keys today?", "What is the reason he put the keys here?"], tense: TENSES.PRETERITE },
            { type: 'drag', q: "We didn't put any obstacles.", a: ["Nosotros", "no", "pusimos", "trabas", "en", "el", "camino"], dist: ["ponen", "puso"], tense: TENSES.PRETERITE },
            { type: 'drag', q: "Translate: 'I put the keys on the table.'", a: ["Yo", "puse", "las", "llaves", "en", "la", "mesa"], dist: ["pongo", "sobre"], tense: TENSES.PRETERITE },

            // CONTINUOUS (26-37)
            { type: 'drag', q: "I am putting the clothes in the closet.", a: ["Estoy", "poniendo", "la", "ropa", "en", "el", "armario"], dist: ["puse", "pongo"], tense: TENSES.CONTINUOUS },
            { type: 'mcq', q: "Translate: 'They are putting on the movie.'", a: "Están poniendo la película.", options: ["Están poniendo la película.", "Están puesto la película.", "Están ponen la película.", "Están pusimos la película."], tense: TENSES.CONTINUOUS },
            { type: 'tf', q: "Gerund of poner is 'poniendo'.", a: "True", tense: TENSES.CONTINUOUS },
            { type: 'blank', q: "Tú ___ (are putting) las flores en el jarrón.", a: ["estás", "poniendo"], tense: TENSES.CONTINUOUS },
            { type: 'audio', q: "Identify audio.", audioText: "No estamos poniendo música ahora.", a: "We aren't putting music on now.", options: ["We aren't putting music on now.", "We don't put the loud music on the radio.", "They aren't putting the classical music now.", "I'm not putting any music in the living room."], tense: TENSES.CONTINUOUS },
            { type: 'drag', q: "Translate: 'He is putting the baby in the crib.'", a: ["Él", "está", "poniendo", "al", "bebé", "en", "la", "cuna"], dist: ["puse", "pone"], tense: TENSES.CONTINUOUS },
            { type: 'drag', q: "Are you all putting the chair in the corner?", a: ["¿", "Están", "ustedes", "poniendo", "la", "silla", "en", "la", "esquina", "?"], dist: ["puse", "ponen"], tense: TENSES.CONTINUOUS },
            { type: 'mcq', q: "Ella ___ the star on the tree.", a: "está poniendo", options: ["está poniendo", "está pone", "está puso", "está ponen"], tense: TENSES.CONTINUOUS },
            { type: 'tf', q: "Reflexive pronouns go before 'estar'.", a: "True", tense: TENSES.CONTINUOUS },
            { type: 'blank', q: "Usted ___ (are putting) las cartas en el buzón.", a: ["está", "poniendo"], tense: TENSES.CONTINUOUS },
            { type: 'audio', q: "Translate audio.", audioText: "¿Qué estás poniendo en la bolsa?", a: "What are you putting in the bag?", options: ["What are you putting in the bag?", "What did you put inside the school bag?", "Who is putting the heavy books in the bag?", "How are you putting the groceries in the bag?"], tense: TENSES.CONTINUOUS },
            { type: 'drag', q: "We are setting the table.", a: ["Estamos", "poniendo", "la", "mesa"], dist: ["puse", "ponemos"], tense: TENSES.CONTINUOUS },

            // FUTURE (38-50)
            { type: 'drag', q: "I am going to put the order in the system.", a: ["Yo", "voy", "a", "poner", "el", "pedido", "en", "el", "sistema"], dist: ["puse", "pongo"], tense: TENSES.FUTURE },
            { type: 'mcq', q: "They are going to put more lights.", a: "Van a poner más luces.", options: ["Van a poner más luces.", "Van a puse más luces.", "Van a pongo más luces.", "Van a pondrán más luces."], tense: TENSES.FUTURE },
            { type: 'tf', q: "Future uses 'ir + a + infinitive'.", a: "True", tense: TENSES.FUTURE },
            { type: 'blank', q: "Tú ___ (going to put) el cartel en la pared.", a: ["vas", "a", "poner"], tense: TENSES.FUTURE },
            { type: 'audio', q: "Identify audio.", audioText: "No voy a poner eso en mi mochila.", a: "I'm not going to put that in my backpack.", options: ["I'm not going to put that in my backpack.", "I didn't put the blue notebook in my backpack.", "He is not going to put his toys in my backpack.", "We aren't going to put the lunch in the backpack."], tense: TENSES.FUTURE },
            { type: 'drag', q: "Translate: 'She is going to put on the red dress.'", a: ["Ella", "se", "va", "a", "poner", "el", "vestido", "rojo"], dist: ["puse", "azul"], tense: TENSES.FUTURE },
            { type: 'drag', q: "Are you going to put the code in the door?", a: ["¿", "Vas", "a", "poner", "el", "código", "en", "la", "puerta", "?"], dist: ["puse", "clave"], tense: TENSES.FUTURE },
            { type: 'mcq', q: "Ustedes ___ a lot of effort.", a: "van a poner", options: ["van a poner", "va a poner", "vamos a poner", "ir a poner"], tense: TENSES.FUTURE },
            { type: 'tf', q: "'Se va a poner' is correct.", a: "True", tense: TENSES.FUTURE },
            { type: 'blank', q: "Él ___ (going to put on) los guantes.", a: ["se", "va", "a", "poner"], tense: TENSES.FUTURE },
            { type: 'audio', q: "Translate audio.", audioText: "¿Van a poner música en la fiesta?", a: "Are they going to put music on at the party?", options: ["Are they going to put music on at the party?", "Are they putting festive music at the big party?", "Did they put the disco music for the party?", "Do they put the soft music during the party?"], tense: TENSES.FUTURE },
            { type: 'drag', q: "We are going to put the fence around the garden.", a: ["Vamos", "a", "poner", "la", "valla", "alrededor", "del", "jardín"], dist: ["puse", "puedo"], tense: TENSES.FUTURE },
            { type: 'drag', q: "Translate: 'He is going to put the trash out.'", a: ["Él", "va", "a", "poner", "la", "basura", "afuera"], dist: ["puse", "dentro"], tense: TENSES.FUTURE }
        ];

        const QUESTIONS = QUESTIONS_RAW.map((item, idx) => {
            const bank = item.type === 'drag' ? [...item.a, ...item.dist].map((w, i) => ({ text: w, id: `w-${idx}-${i}` })).sort(() => Math.random() - 0.5) : [];
            const shuffledOptions = item.options ? [...item.options].sort(() => Math.random() - 0.5) : [];
            return { ...item, id: idx, bank, shuffledOptions };
        });

        // --- APP COMPONENT ---
        function App() {
            const [user, setUser] = useState(null);
            const [step, setStep] = useState('auth'); 
            const [form, setForm] = useState({ firstName: '', lastName: '', email: '', period: '' });
            const [currentIdx, setCurrentIdx] = useState(0);
            const [responses, setResponses] = useState({}); 
            const [cheatCount, setCheatCount] = useState(0);
            const [showAlert, setShowAlert] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [lastViewedTense, setLastViewedTense] = useState(null);

            useEffect(() => {
                const timer = setTimeout(() => { if (!user) setUser({ uid: 'local-' + Date.now() }); }, 1200);
                if (window.isFirebaseAvailable && window.auth) {
                    const unsub = window.auth.onAuthStateChanged(u => { if (u) { setUser(u); clearTimeout(timer); } });
                    window.auth.signInAnonymously().catch(() => {});
                    return () => { unsub(); clearTimeout(timer); };
                } else { setUser({ uid: 'local' }); clearTimeout(timer); }
            }, []);

            useEffect(() => {
                const handleVisibility = () => { if (document.hidden && step === 'quiz') { setCheatCount(c => c + 1); setShowAlert(true); } };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [step]);

            const handleStart = () => {
                if (!form.firstName || !form.lastName || !form.email || !form.period || !user) return;
                setLastViewedTense(QUESTIONS[0].tense);
                setStep('learn');
            };

            const toggleWord = (wordObj) => {
                const currentArr = responses[currentIdx] || [];
                if (currentArr.some(w => w.id === wordObj.id)) {
                    setResponses({ ...responses, [currentIdx]: currentArr.filter(w => w.id !== wordObj.id) });
                } else {
                    setResponses({ ...responses, [currentIdx]: [...currentArr, wordObj] });
                }
            };

            const nextQuestion = () => {
                const nextIdx = currentIdx + 1;
                if (nextIdx < QUESTIONS.length) {
                    const curT = QUESTIONS[currentIdx].tense;
                    const nxtT = QUESTIONS[nextIdx].tense;
                    setCurrentIdx(nextIdx);
                    if (curT !== nxtT) { setLastViewedTense(nxtT); setStep('learn'); }
                } else { submitQuiz(); }
            };

            const submitQuiz = async () => {
                setIsSubmitting(true);
                let scoreVal = 0;
                const log = QUESTIONS.map((q, idx) => {
                    let correct = false;
                    const res = responses[idx];
                    if (!res) return `${idx + 1}w`;
                    if (q.type === 'drag') {
                        const userStr = normalizeText(res.map(w => w.text).join(" "));
                        const variations = [q.a.join(" "), q.alt?.join(" ")].filter(Boolean).map(v => normalizeText(v));
                        if (variations.includes(userStr)) { correct = true; scoreVal++; }
                    } else if (q.type === 'blank') {
                        if (q.a.map(v => normalizeText(v)).includes(normalizeText(res))) { correct = true; scoreVal++; }
                    } else {
                        if (normalizeText(res) === normalizeText(q.a)) { correct = true; scoreVal++; }
                    }
                    return `${idx + 1}${correct ? 'r' : 'w'}`;
                }).join(", ");

                const subData = {
                    title: QUIZ_TITLE, date: new Date().toLocaleString(),
                    firstName: form.firstName, lastName: form.lastName,
                    email: form.email, period: form.period,
                    displayScore: `${scoreVal}/50`, cheatCount, resultsLog: log,
                    userId: user.uid
                };

                fetch(googleSheetUrl, { method: 'POST', mode: 'no-cors', cache: 'no-cache', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(subData) }).catch(e => console.error(e));

                if (window.isFirebaseAvailable && window.db && !user.uid.startsWith('local')) {
                    try { await window.db.doc(`artifacts/${internalAppId}/public/data/submissions/${form.email.trim().toLowerCase().replace(/[^a-z0-9]/g, '_')}`).set(subData); } catch (e) {}
                }
                setStep('results');
                downloadCSV(subData);
                setIsSubmitting(false);
            };

            const downloadCSV = (data) => {
                const headers = ["Nombre", "Apellido", "Email", "Periodo", "Puntaje", "Trampas", "Registro"];
                const row = [data.firstName, data.lastName, data.email, data.period, `'${data.displayScore}`, data.cheatCount, data.resultsLog].map(f => `"${f}"`).join(",");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI("data:text/csv;charset=utf-8," + headers.join(",") + "\n" + row));
                link.setAttribute("download", `notas_poner_${data.lastName}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handlePlayAudio = async (text) => {
                if (apiKey) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } })
                        });
                        const result = await response.json();
                        const b64 = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        if (b64) {
                            const audio = new Audio(URL.createObjectURL(new Blob([pcmToWav(b64)], { type: 'audio/wav' })));
                            audio.play();
                            return;
                        }
                    } catch (e) {}
                }
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text); u.lang = 'es-ES'; u.rate = 0.9;
                    window.speechSynthesis.speak(u);
                }
            };

            if (!user) return <div className="h-screen flex items-center justify-center font-bold text-lime-600 animate-pulse text-2xl uppercase">Cargando...</div>;

            const q = QUESTIONS[currentIdx];

            return (
                <div className="min-h-screen p-4 md:p-8 flex items-center justify-center">
                    {showAlert && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
                            <div className="bg-white rounded-3xl p-10 max-w-sm text-center shadow-2xl border-4 border-red-500">
                                <h2 className="text-3xl font-black text-slate-900 mb-2 uppercase tracking-widest">¡ALERTA!</h2>
                                <p className="text-slate-600 mb-6 font-medium text-lg">Salir de la pestaña queda registrado.</p>
                                <button onClick={() => setShowAlert(false)} className="w-full bg-red-500 text-white font-bold py-4 rounded-2xl">Vuelve al examen</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-lime-100 min-h-[600px] flex flex-col relative quiz-card">
                        <div className="bg-lime-500 p-6 text-white flex justify-between items-center shadow-md">
                            <h1 className="text-xl font-black uppercase tracking-widest">{QUIZ_TITLE}</h1>
                            {step === 'quiz' && <div className="bg-white/20 px-4 py-1 rounded-full text-sm font-bold">{currentIdx + 1} / 50</div>}
                        </div>

                        {step === 'auth' && (
                            <div className="p-10 flex-grow flex flex-col justify-center animate-in fade-in">
                                <div className="max-w-md mx-auto w-full space-y-6 text-center">
                                    <h2 className="text-3xl font-black text-slate-900 uppercase">Ingreso Estudiante</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="w-full p-4 bg-white border-2 rounded-2xl outline-none focus:border-lime-500 font-medium shadow-sm" placeholder="Nombre" value={form.firstName} onChange={e => setForm({...form, firstName: e.target.value})} />
                                        <input className="w-full p-4 bg-white border-2 rounded-2xl outline-none focus:border-lime-500 font-medium shadow-sm" placeholder="Apellido" value={form.lastName} onChange={e => setForm({...form, lastName: e.target.value})} />
                                    </div>
                                    <input className="w-full p-4 bg-white border-2 rounded-2xl outline-none focus:border-lime-500 font-medium shadow-sm" placeholder="Email o ID Estudiantil" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                                    <select className="w-full p-4 bg-white border-2 rounded-2xl outline-none focus:border-lime-500 font-bold shadow-sm" value={form.period} onChange={e => setForm({...form, period: e.target.value})}>
                                        <option value="">Selecciona tu periodo...</option>
                                        {['1st', 'A2', 'A4', 'B3', 'B4', '5th'].map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <button onClick={handleStart} disabled={!form.firstName || !form.lastName || !form.email || !form.period} className="w-full bg-lime-500 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-lime-600 transition-all uppercase tracking-widest text-lg">Entrar</button>
                                </div>
                            </div>
                        )}

                        {step === 'learn' && lastViewedTense && (
                            <div className="p-10 flex-grow flex flex-col justify-center text-center space-y-8">
                                <h2 className="text-4xl font-black text-lime-600 uppercase">{LEARNING_SLIDES[lastViewedTense].title}</h2>
                                <div className="bg-white p-8 rounded-3xl border-l-[12px] border-lime-400 text-left shadow-lg">
                                    <p className="text-xl leading-relaxed text-slate-700 font-medium mb-6">{LEARNING_SLIDES[lastViewedTense].desc}</p>
                                    <div className="space-y-4">
                                        {LEARNING_SLIDES[lastViewedTense].examples.map((ex, i) => (
                                            <div key={i} className="bg-slate-50 p-4 rounded-xl border border-lime-100">
                                                <div className="text-lime-700 font-black text-xl">{ex.s}</div>
                                                <div className="text-slate-400 italic text-sm">{ex.t}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => setStep('quiz')} className="bg-lime-500 text-white font-black py-5 px-20 rounded-2xl text-xl shadow-2xl hover:bg-lime-600 uppercase">Siguiente</button>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="p-8 flex-grow flex flex-col animate-in fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="bg-lime-100 text-lime-700 px-4 py-1 rounded-full text-xs font-black uppercase border border-lime-200">{q.tense}</span>
                                </div>
                                <div className="text-center mb-8">
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Traduce:</p>
                                    <h2 className="text-4xl md:text-5xl font-black text-slate-900 leading-tight">{q.q}</h2>
                                </div>

                                {q.type === 'audio' && (
                                    <div className="flex justify-center mb-8">
                                        <button onClick={() => handlePlayAudio(q.audioText)} className="bg-slate-800 text-white p-8 rounded-full hover:bg-slate-700 shadow-2xl flex items-center gap-4 active:scale-90 transition-all">
                                            <svg className="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M11 5L6 9H2v2h4l5 4V5zM14.5 10c0-1.5-1-2.5-1-2.5v5s1-1 1-2.5z"/></svg>
                                            <span className="text-xl font-black uppercase tracking-widest">Oír Audio</span>
                                        </button>
                                    </div>
                                )}

                                <div className="flex-grow flex flex-col justify-center">
                                    {q.type === 'drag' && (
                                        <>
                                            <div className="min-h-[110px] bg-white rounded-3xl border-4 border-dotted border-lime-200 mb-8 flex flex-wrap gap-2.5 p-6 items-center justify-center shadow-inner">
                                                {(responses[currentIdx] || []).map((wordObj) => (
                                                    <button key={wordObj.id} onClick={() => toggleWord(wordObj)} className="bg-lime-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg text-lg border-b-4 border-lime-700 animate-in zoom-in">{wordObj.text}</button>
                                                ))}
                                            </div>
                                            <div className="flex flex-wrap gap-3 justify-center mb-auto">
                                                {q.bank.map((wordObj) => {
                                                    const used = (responses[currentIdx] || []).some(w => w.id === wordObj.id);
                                                    return <button key={wordObj.id} onClick={() => !used && toggleWord(wordObj)} disabled={used} className={`px-6 py-4 rounded-2xl font-bold border-2 transition-all text-xl shadow-sm ${used ? 'bg-slate-50 text-slate-100 border-slate-50 opacity-20 scale-90' : 'bg-white border-lime-200 text-lime-600 hover:border-lime-500 hover:bg-lime-50'}`}>{wordObj.text}</button>
                                                })}
                                            </div>
                                        </>
                                    )}

                                    {(q.type === 'mcq' || q.type === 'audio') && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-auto">
                                            {q.shuffledOptions.map(opt => (
                                                <button key={opt} onClick={() => setResponses({...responses, [currentIdx]: opt})} className={`p-6 rounded-2xl font-bold border-4 text-left transition-all text-lg shadow-sm ${responses[currentIdx] === opt ? 'bg-lime-500 text-white border-lime-600 scale-95 shadow-lg' : 'bg-white border-slate-100 text-slate-700 hover:border-lime-200'}`}>{opt}</button>
                                            ))}
                                        </div>
                                    )}

                                    {q.type === 'tf' && (
                                        <div className="flex gap-8 justify-center mb-auto pt-10">
                                            {["True", "False"].map(val => (
                                                <button key={val} onClick={() => setResponses({...responses, [currentIdx]: val})} className={`px-16 py-10 rounded-3xl font-black text-3xl border-4 transition-all shadow-md ${responses[currentIdx] === val ? 'bg-lime-500 text-white border-lime-600 shadow-xl scale-105' : 'bg-white border-slate-100 text-slate-700 hover:border-slate-50'}`}>{val === "True" ? "CIERTO" : "FALSO"}</button>
                                            ))}
                                        </div>
                                    )}

                                    {q.type === 'blank' && (
                                        <div className="mb-auto pt-10 text-center">
                                            <input className="w-full max-w-lg p-8 text-3xl font-black text-center bg-white border-4 border-lime-200 rounded-[40px] outline-none focus:border-lime-500 text-lime-700 shadow-xl" placeholder="Respuesta..." value={responses[currentIdx] || ""} onChange={(e) => setResponses({...responses, [currentIdx]: e.target.value})} />
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-between items-center mt-12 pt-8 border-t-2 border-slate-100">
                                    <button onClick={() => currentIdx > 0 && setCurrentIdx(currentIdx-1)} disabled={currentIdx === 0} className="font-black text-slate-300 hover:text-lime-500 uppercase tracking-widest disabled:opacity-0 transition-colors">Atrás</button>
                                    <button onClick={() => { if (currentIdx < QUESTIONS.length - 1) nextQuestion(); else submitQuiz(); }} disabled={isSubmitting} className="bg-slate-800 text-white px-20 py-5 rounded-3xl font-black shadow-2xl hover:bg-slate-900 transition-all active:scale-95 uppercase tracking-widest text-lg">
                                        {isSubmitting ? 'Guardando...' : (currentIdx === 49 ? 'Finalizar' : 'Siguiente')}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'results' && (
                            <div className="p-16 flex-grow flex flex-col justify-center text-center space-y-10 animate-in zoom-in duration-700">
                                <div className="w-32 h-32 bg-lime-100 rounded-full flex items-center justify-center mx-auto shadow-inner border-4 border-lime-200 animate-bounce">
                                    <svg className="w-16 h-16 text-lime-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7" /></svg>
                                </div>
                                <div>
                                    <h2 className="text-6xl font-black text-slate-900 tracking-tighter uppercase mb-4">¡LOGRADO!</h2>
                                    <p className="text-2xl text-slate-500 font-medium max-w-lg mx-auto leading-relaxed">Tus resultados han sido guardados. El archivo CSV se ha descargado automáticamente.</p>
                                </div>
                                <button onClick={() => window.location.reload()} className="max-w-md mx-auto w-full bg-slate-800 text-white py-6 rounded-3xl font-black hover:bg-slate-900 transition-all shadow-2xl uppercase tracking-widest text-xl active:scale-95">Reiniciar</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
